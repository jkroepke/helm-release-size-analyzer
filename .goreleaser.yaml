# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

builds:
  - id: "helm-release-size-analyser"
    main: ./cmd/helm-release-size-analyser
    binary: helm-release-size-analyser
    goos:
      - linux
      - freebsd
      - openbsd
    goarch:
      - amd64
      - arm64
    goamd64:
      - v2
    mod_timestamp: '{{ .CommitTimestamp }}'
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X helm-release-size-analyser/internal/version.Version={{.Version}}
        -X helm-release-size-analyser/internal/version.Revision={{.Commit}}
        -X helm-release-size-analyser/internal/version.Branch={{.Branch}}
        -X helm-release-size-analyser/internal/version.BuildDate={{.Date}}

archives:
  - id: helm-release-size-analyser
    ids:
      - helm-release-size-analyser
    formats: ['tar.xz']
    files:
      - LICENSE.txt

checksum:
  name_template: "checksums.txt"

report_sizes: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

gomod:
  proxy: true

release:
  draft: false
  replace_existing_draft: true
  prerelease: auto

changelog:
  use: github-native

sboms:
  - artifacts: archive
